<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spiderweb — gregkepler algorithm × verlet-js physics</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  #stage {
    display: block;
    background: #000;
    cursor: grab;
  }
  #stage:active { cursor: grabbing; }
  #hud {
    position: fixed; top: 16px; left: 18px;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    color: #c9cdd6; pointer-events: none; user-select: none;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  #hud h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: .2px; color: #e7eaf0; }
  #hud p { margin: 4px 0 0; font-size: 12px; color: #9298a4; line-height: 1.5; }
  #hud .k { color: #c9cdd6; font-weight: 600; }
  #controls { position: fixed; top: 16px; right: 18px; display: flex; gap: 8px; }
  #controls button {
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 12px; color: #d4d8e0; background: rgba(40,42,52,.85);
    border: 1px solid rgba(120,126,140,.35); border-radius: 6px;
    padding: 7px 12px; cursor: pointer; backdrop-filter: blur(4px);
  }
  #controls button:hover { background: rgba(58,60,72,.95); color: #fff; }
  /* narrow screens: buttons on the top row (fixed height), the HUD text flows below them
     so the two never overlap; slightly smaller type + tighter padding */
  @media (max-width: 640px) {
    #controls { top: 12px; right: 12px; gap: 6px; }
    #controls button { font-size: 11px; padding: 6px 9px; }
    #hud { top: 52px; left: 14px; right: 14px; }
    #hud h1 { font-size: 14px; }
    #hud p { font-size: 11px; }
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="hud">
    <h1>Spiderweb</h1>
    <p>gregkepler 生成演算法 &times; verlet-js 物理<br>
       <span class="k">拖曳</span>蛛絲或蜘蛛 &middot; 按 <span class="k">R</span> 重新結網 &middot; 蜘蛛會自己爬</p>
  </div>
  <div id="controls">
    <button id="addBug">🐛 放昆蟲</button>
    <button id="regen">重新結網 (R)</button>
    <button id="toggleSpider">蜘蛛開關</button>
  </div>

  <script src="verlet-1.0.0.js"></script>
  <script>
  /* ------------------------------------------------------------------ *
   *  organicWeb — port of Greg Kepler's spider-webs-js generation
   *  algorithm onto the verlet-js physics engine (Sub Protocol, MIT).
   *
   *  Original structural logic (anchors -> suspension frame -> rays ->
   *  bars with organic gaps / Y-strands / reinforcement) comes from
   *  spider-webs-js/spiderwebs/web.js. Here it is rebuilt with verlet-js
   *  Particles + DistanceConstraints so the web is fully draggable.
   * ------------------------------------------------------------------ */
  VerletJS.prototype.organicWeb = function(origin, opts) {
    opts = opts || {};
    var pointNum = opts.pointNum;          // main suspension anchors
    var radiusBase = opts.radiusBase;      // base anchor radius
    var raysPer = opts.raysPerSegment;     // rays between two anchors
    var levels = opts.levels;              // bar levels per ray (barPointAmt)

    var stiffSusp  = 0.995;  // anchor -> screen edge (very taut, reinforced)
    var stiffFrame = 0.98;   // outer perimeter ring (taut)
    var stiffRay   = 0.96;   // radial threads (stiff dragline)
    var stiffBar   = 0.62;   // capture-spiral bars (kept elastic, as in nature)

    var W = this.width, H = this.height, inset = 10;
    var cx = origin.x, cy = origin.y;
    var composite = new this.Composite();

    function P(x, y) { var p = new Particle(new Vec2(x, y)); composite.particles.push(p); return p; }
    function link(a, b, stiff, kind) {
      var c = new DistanceConstraint(a, b, stiff);
      c.kind = kind;
      composite.constraints.push(c);
      return c;
    }
    // intersection of ray (from center along ang) with the inset canvas rect
    function edgePoint(ang) {
      var dx = Math.cos(ang), dy = Math.sin(ang);
      var tx = dx > 0 ? (W - inset - cx) / dx : (dx < 0 ? (inset - cx) / dx : Infinity);
      var ty = dy > 0 ? (H - inset - cy) / dy : (dy < 0 ? (inset - cy) / dy : Infinity);
      var t = Math.min(tx, ty);
      return { x: cx + dx * t, y: cy + dy * t };
    }

    // 1. anchor directions, each with a randomized radius (organic, not a circle)
    var anchors = [];
    for (var i = 0; i < pointNum; i++) {
      var ang = i * (2 * Math.PI / pointNum) + (Math.random() - 0.5) * 0.28;
      var r = radiusBase * (0.7 + Math.random() * 0.6);
      anchors.push({ ang: ang, r: r });
    }

    // 2. ray seed points: interpolate raysPer rays along each anchor->anchor arc
    var rays = [];
    for (var a = 0; a < pointNum; a++) {
      var A = anchors[a], B = anchors[(a + 1) % pointNum];
      var angA = A.ang, angB = B.ang;
      if (angB <= angA) angB += 2 * Math.PI;
      for (var s = 0; s < raysPer; s++) {
        var t = s / raysPer;
        var ang = angA + (angB - angA) * t;
        var rad = (A.r + (B.r - A.r) * t) * (0.9 + Math.random() * 0.25);
        rays.push({ ang: ang, rad: rad, isAnchor: (s === 0) });
      }
    }
    var rayCount = rays.length;

    // 3. build each ray: outer perimeter point + inner points toward the hub
    for (var i = 0; i < rayCount; i++) {
      var R = rays[i];
      R.pts = [];
      var outer = P(cx + Math.cos(R.ang) * R.rad, cy + Math.sin(R.ang) * R.rad);
      R.outer = outer;
      R.pts.push(outer);
      for (var k = 1; k <= levels; k++) {
        var f = k / (levels + 1);
        var radK = R.rad * (1 - f) * (0.9 + Math.random() * 0.18);
        var pt = P(cx + Math.cos(R.ang) * radK, cy + Math.sin(R.ang) * radK);
        R.pts.push(pt);
        link(R.pts[R.pts.length - 2], pt, stiffRay, "ray");
      }
    }

    // shared hub at the web center
    var hub = P(cx, cy);
    composite.hub = hub;
    for (var i = 0; i < rayCount; i++)
      link(rays[i].pts[rays[i].pts.length - 1], hub, stiffRay, "ray");

    // hub / strengthening spiral: the innermost few tight, non-sticky turns the spider
    // reinforces around the centre (the "strengthening zone"). Several rings, not one.
    var strengthenRings = 3;
    for (var s = 0; s < strengthenRings; s++) {
      var kk = levels - s;
      if (kk < 1) break;
      for (var i = 0; i < rayCount; i++)
        link(rays[i].pts[kk], rays[(i + 1) % rayCount].pts[kk], 0.96, "hub");
    }

    // 4. outer perimeter ring (irregular polygon frame)
    for (var i = 0; i < rayCount; i++)
      link(rays[i].outer, rays[(i + 1) % rayCount].outer, stiffFrame, "frame");

    // 5. suspension lines: anchor rays shoot to the screen edge and pin there
    for (var i = 0; i < rayCount; i++) {
      if (!rays[i].isAnchor) continue;
      var e = edgePoint(rays[i].ang);
      var ep = P(e.x, e.y);
      link(rays[i].outer, ep, stiffSusp, "susp");
      composite.pin(composite.particles.indexOf(ep));
    }

    // 6. capture-spiral bars between adjacent rays, with organic variation.
    // Leave the innermost rings bar-free: real orb webs keep a sticky-free "free zone"
    // around the hub where only radii run and the spider rests. (pts[levels] = hub side)
    var freeZone = 3;            // innermost rings with no capture spiral (matches strengthening zone)
    for (var k = 1; k <= levels - freeZone; k++) {
      for (var i = 0; i < rayCount; i++) {
        var R = rays[i], N = rays[(i + 1) % rayCount];
        var chance = Math.floor(Math.random() * 20);
        if (chance === 0 || chance === 18 || chance === 19) continue;   // organic gap
        var pA = R.pts[k], pB = N.pts[k];
        if (chance === 1) {
          // Y-shaped strand
          var mid = P((pA.pos.x + pB.pos.x) / 2, (pA.pos.y + pB.pos.y) / 2);
          link(pA, mid, stiffBar, "bar");
          link(mid, N.pts[k], stiffBar, "bar");
          link(mid, N.pts[Math.min(k + 1, levels)], stiffBar, "bar");
        } else {
          link(pA, pB, stiffBar, "bar");
          if (chance === 2)   // extra reinforcement to a neighbouring level
            link(pA, N.pts[Math.max(1, k - 1)], stiffBar, "bar");
        }
      }
    }

    this.composites.push(composite);
    return composite;
  };

  /* ------------------------------------------------------------------ *
   *  spider + crawl — adapted verbatim from verlet-js spiderweb.html
   *  (Sub Protocol, MIT). Only draw colours are changed for dark bg.
   * ------------------------------------------------------------------ */
  VerletJS.prototype.spider = function(origin, scale) {
    var i;
    scale = scale || 1;
    var legSeg = 0.99, joint1 = 1, joint2 = 0.4, joint3 = 0.9, bodyStiffness = 1, bodyJointStiffness = 1;
    var composite = new this.Composite();
    composite.legs = [];
    composite.scale = scale;

    composite.thorax = new Particle(origin);
    var tilt = (Math.random() - 0.5) * 5 * scale;   // slight body-axis tilt, not perfectly upright
    composite.head = new Particle(origin.add(new Vec2(tilt, -5 * scale)));
    composite.abdomen = new Particle(origin.add(new Vec2(-tilt, 10 * scale)));
    composite.particles.push(composite.thorax, composite.head, composite.abdomen);
    composite.constraints.push(new DistanceConstraint(composite.head, composite.thorax, bodyStiffness));
    composite.constraints.push(new DistanceConstraint(composite.abdomen, composite.thorax, bodyStiffness));
    composite.constraints.push(new AngleConstraint(composite.abdomen, composite.thorax, composite.head, 0.4));

    for (i = 0; i < 4; ++i) {
      composite.particles.push(new Particle(composite.particles[0].pos.add(new Vec2(3 * scale, (i - 1.5) * 3 * scale))));
      composite.particles.push(new Particle(composite.particles[0].pos.add(new Vec2(-3 * scale, (i - 1.5) * 3 * scale))));
      var len = composite.particles.length;
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 2], composite.thorax, legSeg));
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 1], composite.thorax, legSeg));

      var lenCoef = 1; if (i == 1 || i == 2) lenCoef = 0.7; else if (i == 3) lenCoef = 0.9;
      // natural asymmetry: each individual leg gets its own length factor + splay jitter,
      // so the pose is never perfectly symmetric and differs on every spawn
      var rR = 0.8 + Math.random() * 0.5, rL = 0.8 + Math.random() * 0.5;
      var aR = (Math.random() - 0.5) * 16, aL = (Math.random() - 0.5) * 16;
      composite.particles.push(new Particle(composite.particles[len - 2].pos.add((new Vec2(20, (i - 1.5) * 30 + aR)).normal().mutableScale(20 * lenCoef * scale * rR))));
      composite.particles.push(new Particle(composite.particles[len - 1].pos.add((new Vec2(-20, (i - 1.5) * 30 + aL)).normal().mutableScale(20 * lenCoef * scale * rL))));
      len = composite.particles.length;
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 4], composite.particles[len - 2], legSeg));
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 3], composite.particles[len - 1], legSeg));

      composite.particles.push(new Particle(composite.particles[len - 2].pos.add((new Vec2(20, (i - 1.5) * 50 + aR)).normal().mutableScale(20 * lenCoef * scale * rR))));
      composite.particles.push(new Particle(composite.particles[len - 1].pos.add((new Vec2(-20, (i - 1.5) * 50 + aL)).normal().mutableScale(20 * lenCoef * scale * rL))));
      len = composite.particles.length;
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 4], composite.particles[len - 2], legSeg));
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 3], composite.particles[len - 1], legSeg));

      var rightFoot = new Particle(composite.particles[len - 2].pos.add((new Vec2(20, (i - 1.5) * 100 + aR)).normal().mutableScale(12 * lenCoef * scale * rR)));
      var leftFoot = new Particle(composite.particles[len - 1].pos.add((new Vec2(-20, (i - 1.5) * 100 + aL)).normal().mutableScale(12 * lenCoef * scale * rL)));
      composite.particles.push(rightFoot, leftFoot);
      composite.legs.push(rightFoot, leftFoot);
      len = composite.particles.length;
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 4], composite.particles[len - 2], legSeg));
      composite.constraints.push(new DistanceConstraint(composite.particles[len - 3], composite.particles[len - 1], legSeg));
      composite.constraints.push(new AngleConstraint(composite.particles[len - 6], composite.particles[len - 4], composite.particles[len - 2], joint3));
      composite.constraints.push(new AngleConstraint(composite.particles[len - 6 + 1], composite.particles[len - 4 + 1], composite.particles[len - 2 + 1], joint3));
      composite.constraints.push(new AngleConstraint(composite.particles[len - 8], composite.particles[len - 6], composite.particles[len - 4], joint2));
      composite.constraints.push(new AngleConstraint(composite.particles[len - 8 + 1], composite.particles[len - 6 + 1], composite.particles[len - 4 + 1], joint2));
      composite.constraints.push(new AngleConstraint(composite.particles[0], composite.particles[len - 8], composite.particles[len - 6], joint1));
      composite.constraints.push(new AngleConstraint(composite.particles[0], composite.particles[len - 8 + 1], composite.particles[len - 6 + 1], joint1));
      composite.constraints.push(new AngleConstraint(composite.particles[1], composite.particles[0], composite.particles[len - 8], bodyJointStiffness));
      composite.constraints.push(new AngleConstraint(composite.particles[1], composite.particles[0], composite.particles[len - 8 + 1], bodyJointStiffness));
    }
    this.composites.push(composite);
    return composite;
  };

  function shuffle(o) { for (var j, x, i = o.length; i; j = Math.floor(Math.random() * i), x = o[--i], o[i] = o[j], o[j] = x); return o; }

  VerletJS.prototype.crawl = function(leg) {
    var web = this.composites[0], spider = this.composites[1];
    if (!spider) return;
    var sc = spider.scale || 1;
    var stepRadius = 110 * sc, minStepRadius = 40 * sc;
    var theta = spider.particles[0].pos.angle2(spider.particles[0].pos.add(new Vec2(1, 0)), spider.particles[1].pos);
    var b1 = new Vec2(Math.cos(theta), Math.sin(theta));
    var b2 = new Vec2(Math.cos(theta + Math.PI / 2), Math.sin(theta + Math.PI / 2));
    var flag1 = leg < 4 ? 1 : -1, flag2 = leg % 2 == 0 ? 1 : 0;
    var paths = [], i;
    for (i in web.particles) {
      if (web.particles[i].pos.sub(spider.particles[0].pos).dot(b1) * flag1 >= 0
        && web.particles[i].pos.sub(spider.particles[0].pos).dot(b2) * flag2 >= 0) {
        var d2 = web.particles[i].pos.dist2(spider.particles[0].pos);
        if (!(d2 >= minStepRadius * minStepRadius && d2 <= stepRadius * stepRadius)) continue;
        var taken = false, j;
        for (j in spider.constraints) for (var k = 0; k < 8; ++k)
          if (spider.constraints[j] instanceof DistanceConstraint && spider.constraints[j].a == spider.legs[k] && spider.constraints[j].b == web.particles[i]) taken = true;
        if (!taken) paths.push(web.particles[i]);
      }
    }
    for (i in spider.constraints)
      if (spider.constraints[i] instanceof DistanceConstraint && spider.constraints[i].a == spider.legs[leg]) { spider.constraints.splice(i, 1); break; }
    // grip the web gently (stiffness 0.25) so the spider disturbs/shakes the web ~75% less
    if (paths.length > 0) { shuffle(paths); spider.constraints.push(new DistanceConstraint(spider.legs[leg], paths[0], 0.25, 0)); }
  };

  /* ------------------------------ draw styling ------------------------------ */
  function styleWeb(web) {
    web.drawParticles = function() {};   // silk only, no node dots
    web.drawConstraints = function(ctx, composite) {
      // Thickness hierarchy follows real orb-web biology:
      // anchor/bridge silk (thickest, reinforced) > frame > radii >> capture spiral.
      // Thickness hierarchy (real orb-web biology), levels pulled ~25% closer together:
      // anchor/bridge > frame > hub/strengthening spiral > radii > capture spiral.
      var styles = {
        susp:  { s: "rgba(240,244,250,0.78)", w: 0.58 },  // anchor / bridge dragline
        frame: { s: "rgba(226,232,240,0.68)", w: 0.54 },  // perimeter frame (often doubled)
        hub:   { s: "rgba(222,228,238,0.64)", w: 0.52 },  // hub / strengthening spiral (dense turns)
        ray:   { s: "rgba(206,214,225,0.58)", w: 0.5 },   // radii (spokes)
        bar:   { s: "rgba(180,188,202,0.28)", w: 0.45 }   // viscid capture spiral (gossamer)
      };
      ctx.save();
      ctx.globalAlpha = 0.5;   // render the whole web at 50% opacity
      var cons = composite.constraints, i;
      for (i in cons) {
        var c = cons[i];
        if (!(c instanceof DistanceConstraint)) continue;
        var st = styles[c.kind] || styles.bar;
        ctx.beginPath();
        ctx.moveTo(c.a.pos.x, c.a.pos.y);
        ctx.lineTo(c.b.pos.x, c.b.pos.y);
        ctx.strokeStyle = st.s; ctx.lineWidth = st.w; ctx.stroke();
      }
      // bright dot at the very centre of the hub (where the spider rests)
      if (composite.hub) {
        ctx.beginPath();
        ctx.arc(composite.hub.pos.x, composite.hub.pos.y, 2.5, 0, 2 * Math.PI);
        ctx.fillStyle = "rgba(232,236,243,0.7)"; ctx.fill();
      }
      ctx.restore();
    };
  }

  function styleSpider(spider) {
    spider.drawParticles = function() {};
    spider.drawConstraints = function(ctx, composite) {
      var i, sc = composite.scale || 1;
      var ab = spider.abdomen.pos, th = spider.thorax.pos, hd = spider.head.pos;

      // --- soft contact shadow under the body (grounds it on the web, implies light upper-left) ---
      var midx = (hd.x + th.x + ab.x) / 3, midy = (hd.y + th.y + ab.y) / 3;
      var bodyAng = Math.atan2(ab.y - hd.y, ab.x - hd.x);
      ctx.save();
      ctx.translate(midx + 2.2 * sc, midy + 3 * sc);
      ctx.rotate(bodyAng);
      ctx.scale(1.15, 0.5);
      var shG = ctx.createRadialGradient(0, 0, 0, 0, 0, 11 * sc);
      shG.addColorStop(0, "rgba(0,0,0,0.55)"); shG.addColorStop(1, "rgba(0,0,0,0)");
      ctx.beginPath(); ctx.arc(0, 0, 11 * sc, 0, 2 * Math.PI); ctx.fillStyle = shG; ctx.fill();
      ctx.restore();

      // --- legs: tapered capsule segments with a cylindrical highlight + joint knuckles ---
      function legSeg(p1, p2, w) {
        var dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.sqrt(dx * dx + dy * dy) || 1;
        var nx = -dy / len, ny = dx / len, w2 = w * 0.55;
        ctx.beginPath();
        ctx.moveTo(p1.x + nx * w, p1.y + ny * w);
        ctx.lineTo(p2.x + nx * w2, p2.y + ny * w2);
        ctx.lineTo(p2.x - nx * w2, p2.y - ny * w2);
        ctx.lineTo(p1.x - nx * w, p1.y - ny * w);
        ctx.closePath();
        ctx.fillStyle = "#101013"; ctx.fill();
        ctx.beginPath();
        ctx.moveTo(p1.x + nx * w * 0.5, p1.y + ny * w * 0.5);
        ctx.lineTo(p2.x + nx * w2 * 0.5, p2.y + ny * w2 * 0.5);
        ctx.strokeStyle = "rgba(150,155,168,0.4)"; ctx.lineWidth = Math.max(0.4, w * 0.35); ctx.stroke();
        ctx.beginPath(); ctx.arc(p1.x, p1.y, w * 0.9, 0, 2 * Math.PI); ctx.fillStyle = "#0a0a0d"; ctx.fill();
      }
      for (i = 3; i < composite.constraints.length; ++i) {
        var c = composite.constraints[i];
        if (!(c instanceof DistanceConstraint)) continue;
        var lw = 1.2;
        if ((i >= 2 && i <= 4) || (i >= 19 && i <= 20) || (i >= 35 && i <= 36) || (i >= 51 && i <= 52)) lw = 3;
        else if ((i >= 4 && i <= 6) || (i >= 21 && i <= 22) || (i >= 37 && i <= 38) || (i >= 53 && i <= 54)) lw = 2;
        legSeg(c.a.pos, c.b.pos, Math.max(0.6, lw * sc * 0.75));
      }

      // --- body: sphere-shaded beads (radial gradient) instead of flat fills ---
      function bead(p, r) {
        var g = ctx.createRadialGradient(p.x - r * 0.35, p.y - r * 0.4, r * 0.1, p.x, p.y, r * 1.05);
        g.addColorStop(0, "rgba(165,170,182,0.95)"); g.addColorStop(0.3, "#1a1a1e"); g.addColorStop(1, "#020203");
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, 2 * Math.PI);
        ctx.fillStyle = g; ctx.fill();
        ctx.lineWidth = 0.6 * sc; ctx.strokeStyle = "rgba(110,114,124,0.4)"; ctx.stroke();
      }
      bead(hd, 4 * sc);
      bead(th, 4 * sc);
      bead(ab, 8 * sc);

      // --- red hourglass on the abdomen, aligned with the body axis (glossy gradient) ---
      var ang = Math.atan2(ab.y - th.y, ab.x - th.x);
      var al = { x: Math.cos(ang), y: Math.sin(ang) };          // along body
      var pe = { x: -Math.sin(ang), y: Math.cos(ang) };         // perpendicular
      var L = 5.5 * sc, Wd = 3.6 * sc;
      function pt(d, w) { return { x: ab.x + al.x * d + pe.x * w, y: ab.y + al.y * d + pe.y * w }; }
      var hg = ctx.createLinearGradient(ab.x - al.x * L, ab.y - al.y * L, ab.x + al.x * L, ab.y + al.y * L);
      hg.addColorStop(0, "#ff5c52"); hg.addColorStop(0.5, "#a80f16"); hg.addColorStop(1, "#ff5c52");
      ctx.fillStyle = hg;
      var t1a = pt(L, Wd), t1b = pt(L, -Wd);                    // tail-side triangle
      ctx.beginPath(); ctx.moveTo(ab.x, ab.y); ctx.lineTo(t1a.x, t1a.y); ctx.lineTo(t1b.x, t1b.y); ctx.closePath(); ctx.fill();
      var t2a = pt(-L, Wd), t2b = pt(-L, -Wd);                  // head-side triangle
      ctx.beginPath(); ctx.moveTo(ab.x, ab.y); ctx.lineTo(t2a.x, t2a.y); ctx.lineTo(t2b.x, t2b.y); ctx.closePath(); ctx.fill();
    };
  }

  /* ========================================================================
   *  TUNING CONFIG — all runtime motion / timing knobs in one place.
   *  Change values here only; the logic below reads from CONFIG. Each knob is
   *  independent unless noted. (Web-structure constants in organicWeb() are a
   *  one-time build, not motion, and are intentionally left out.)
   * ====================================================================== */
  var CONFIG = {
    physics: {          // GLOBAL — affects the whole web + spider hang. Change with care.
      gravity: 0.025,   // web sag / spider hang
      friction: 0.97    // global damping (web bounce, momentum)
    },
    descend: {          // spider silk-drop entrance (~3.6s)
      payout: 2.88,     // silk pay-out rate = descent speed cap (main knob)
      pull: 0.11,       // extra downward force; keep >= payout*0.03 or descent goes gravity-limited (slower)
      releaseMargin: 30,// stops descending this many px above the hub centre
      silkFade: 0.012   // released dragline fade-out per frame (~1.3s)
    },
    flight: {           // prey arrival flight — per species: forward px/frame + wobble amplitude
      fly:      { speed: 9.0, wobble: 3.4 },
      moth:     { speed: 4.5, wobble: 1.3 },
      mosquito: { speed: 3.6, wobble: 1.6 },
      roach:    { speed: 6.9, wobble: 1.5 },
      wobbleFreq: 0.3   // wobble oscillation frequency (shared)
    },
    stick:   { dist: 12, snagChance: 0.05 },   // when a flying prey sticks to the web
    struggle:{ amp: 1.8, decay: 0.992 },       // stuck-prey web shake + how fast it fades
    husk:    { fallGravity: 0.25, fade: 0.02 },// drained husk drop accel + fade-out (~0.8s)
    crawl: {            // spider walking (tetrapodStep)
      stride: 34,       // leg step-ahead distance = main crawl speed
      swing: 9,         // frames between leg-set swaps (gait cadence)
      assist: 0.35,     // per-frame body nudge toward goal
      gripPlant: 0.75,  // stance-leg grip stiffness when planting ahead
      gripRegrip: 0.6,  // stance-leg grip stiffness when re-gripping
      offWebDrift: 1.5  // crawl-back speed when torn off the web
    },
    hold: 0.15,         // clutch force onto prey/cocoon while wrapping/feeding
    groundGrip: 0.3,    // stiffness of support legs kept planted at rest
    wrap: {             // cocoon wrapping
      baseSec: 4,       // wrap time for the smallest prey
      rangeSec: 4,      // extra seconds added for the largest prey (so 4..8s)
      flingSpeed: 0.28, // hind-leg silk-fling phase speed
      flingRadius: 16   // hind-leg orbit radius around the prey
    },
    feedRate: 0.00175   // feeding drain per frame -> feeding time = 1/rate/60 (~9.5s)
  };

  /* ------------------------------ app / loop ------------------------------ */
  var canvas = document.getElementById("stage");
  var sim, spiderOn = true;
  var drag = null;   // the spider's descent silk (dragline)
  var uiScale = 1;   // responsive size factor: shrinks the spider + prey on small viewports
                     // (the web already scales with min(W,H); this keeps them proportional)

  function build() {
    var W = window.innerWidth, H = window.innerHeight;
    // proportional to the web radius (min(W,H)*0.30); 1.0 on desktops, ~0.49 on a phone
    uiScale = Math.max(0.4, Math.min(1, Math.min(W, H) / 800));
    var dpr = window.devicePixelRatio || 1;
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    var ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);   // reset (don't compound on rebuild)

    sim = new VerletJS(W, H, canvas);
    sim.gravity = new Vec2(0, CONFIG.physics.gravity);
    sim.friction = CONFIG.physics.friction;
    sim.selectionRadius = 24;

    var pointNum = 5 + Math.floor(Math.random() * 3);       // 5..7 anchors
    var raysPer = 5 + Math.floor(Math.random() * 3);        // 5..7 rays per segment (~2x density)
    var radiusBase = Math.min(W, H) * 0.30;
    var web = sim.organicWeb(new Vec2(W / 2, H / 2), {
      pointNum: pointNum, raysPerSegment: raysPer, levels: 13, radiusBase: radiusBase
    });
    styleWeb(web);

    drag = null;
    bugs = [];
    heldBug = null;
    spiderState = "descend"; spiderTarget = null; stepClock = 0;
    if (spiderOn) {
      var spider = sim.spider(new Vec2(W / 2 + (Math.random() - 0.5) * 220, -200), 0.75 * uiScale);  // base size 0.75, shrunk on small viewports
      styleSpider(spider);
      // hang head-down: point-reflect the spider 180 deg about its thorax so the abdomen
      // (where the silk attaches) is on top; the head + legs then hang below under gravity
      var th = spider.thorax.pos;
      for (var pi = 0; pi < spider.particles.length; pi++) {
        var p = spider.particles[pi];
        p.pos.x = 2 * th.x - p.pos.x; p.pos.y = 2 * th.y - p.pos.y;
        p.lastPos.x = 2 * th.x - p.lastPos.x; p.lastPos.y = 2 * th.y - p.lastPos.y;
      }
      // gentle pendulum sway during descent (no violent tumble)
      var sway = (Math.random() - 0.5) * 1.2;
      for (var pi = 0; pi < spider.particles.length; pi++) spider.particles[pi].lastPos.x -= sway;
      // physical descent silk: anchored above, paid out over time, attached to the abdomen
      drag = {
        phase: "descend",
        anchor: { x: spider.abdomen.pos.x, y: spider.abdomen.pos.y },
        length: 0, payout: CONFIG.descend.payout,
        mode: Math.random() < 0.5 ? "drift" : "fall",   // what the silk does after landing
        pts: null, life: 1, age: 0
      };
    }
  }

  // advance the dragline: extend while falling, then release (drift away / fall) on landing
  function updateDrag() {
    if (!drag || !spiderOn) return;
    var sp = sim.composites[1];
    if (!sp) { drag = null; return; }
    drag.age++;
    if (drag.phase === "descend") {
      // pay out silk and hold the abdomen at the silk's end; gravity keeps the head/legs
      // hanging below -> natural head-down posture (this runs AFTER sim.frame each tick)
      drag.length += drag.payout;
      // web gravity is tiny (taut web), so add a uniform extra downward pull to the whole
      // spider for a paced fall. Uniform => no torque => the head-down orientation is preserved.
      for (var pi = 0; pi < sp.particles.length; pi++) sp.particles[pi].lastPos.y -= CONFIG.descend.pull;
      var ab = sp.abdomen, dx = ab.pos.x - drag.anchor.x, dy = ab.pos.y - drag.anchor.y;
      var d = Math.sqrt(dx * dx + dy * dy) || 1e-6;
      if (d > drag.length) { var f = (d - drag.length) / d; ab.pos.x -= dx * f; ab.pos.y -= dy * f; }  // silk can't over-stretch
      // reached the web centre -> release the silk
      if (ab.pos.y >= sim.height * 0.5 - CONFIG.descend.releaseMargin || drag.age > 1600) {
        var n = 16, a = drag.anchor, b = ab.pos;
        drag.pts = [];
        for (var k = 0; k <= n; k++) {
          var t = k / n;
          drag.pts.push({ x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t, vx: 0, vy: 0 });
        }
        drag.phase = "release";
        spiderState = "toCenter";   // landed -> walk to the hub centre and wait for prey
      }
    } else if (drag.phase === "release") {
      drag.life -= CONFIG.descend.silkFade;     // released dragline fade-out
      var pts = drag.pts, k;
      if (drag.mode === "drift") {              // gossamer floats up & sideways on the air
        for (k = 0; k < pts.length; k++) {
          pts[k].x += 0.6 + Math.sin(k * 0.5 + (1 - drag.life) * 4) * 0.3;
          pts[k].y -= 0.45 + (pts.length - k) * 0.02;
        }
      } else {                                  // silk lets go and drops
        for (k = 0; k < pts.length; k++) {
          pts[k].vy += 0.06; pts[k].vx += (Math.random() - 0.5) * 0.04;
          pts[k].x += pts[k].vx; pts[k].y += pts[k].vy;
        }
      }
      if (drag.life <= 0) drag = null;
    }
  }

  // draw the dragline on top of the web (its own opacity, not the web's 50%)
  function drawDrag() {
    if (!drag || !spiderOn) return;
    var ctx = sim.ctx, sp = sim.composites[1];
    var alpha = drag.phase === "descend" ? 0.5 : 0.5 * Math.max(0, drag.life);
    ctx.save();
    ctx.strokeStyle = "rgba(234,238,244," + alpha + ")";
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    if (drag.phase === "descend" && sp) {
      ctx.moveTo(drag.anchor.x, drag.anchor.y);
      ctx.lineTo(sp.abdomen.pos.x, sp.abdomen.pos.y);
    } else if (drag.pts) {
      ctx.moveTo(drag.pts[0].x, drag.pts[0].y);
      for (var k = 1; k < drag.pts.length; k++) ctx.lineTo(drag.pts[k].x, drag.pts[k].y);
    }
    ctx.stroke();
    ctx.restore();
  }

  /* ---------------- prey insects (Phase 1: arrive, stick, struggle) ---------------- */
  var bugs = [];
  var bugSeq = 0;
  var heldBug = null;   // an insect currently grabbed by the mouse
  var BUG_TYPES = ["fly", "moth", "mosquito", "roach"];
  var BUG_SPEC = CONFIG.flight;   // per-species speed/wobble live in CONFIG.flight

  function spawnBug(type) {
    if (!sim) return;
    type = type || BUG_TYPES[Math.floor(Math.random() * BUG_TYPES.length)];
    var W = sim.width, H = sim.height, edge = Math.floor(Math.random() * 4), x, y;
    if (edge === 0) { x = Math.random() * W; y = -30; }
    else if (edge === 1) { x = W + 30; y = Math.random() * H; }
    else if (edge === 2) { x = Math.random() * W; y = H + 30; }
    else { x = -30; y = Math.random() * H; }
    // target a random DEPTH on the web (0.15 = near hub, 1.0 = rim) so prey lands inside & out
    var ang = Math.random() * 6.283, rad = (0.15 + Math.random() * 0.85) * Math.min(W, H) * 0.3;
    var spec = BUG_SPEC[type];
    var size = 0.8 + Math.random() * 0.6;                 // size variation -> depth / spatial feel
    var wrapSecs = CONFIG.wrap.baseSec + ((size - 0.8) / 0.6) * CONFIG.wrap.rangeSec;   // size-scaled wrap time (from the unscaled size)
    size *= uiScale;                                      // shrink the drawn prey on small viewports (visual only)
    bugs.push({
      type: type, x: x, y: y,
      tx: W / 2 + Math.cos(ang) * rad, ty: H / 2 + Math.sin(ang) * rad,
      speed: spec.speed, wobble: spec.wobble, ang: 0, phase: Math.random() * 6.283,
      size: size, wrapRate: 1 / (wrapSecs * 60),          // per-frame (~60fps) cocoon growth
      id: ++bugSeq,                       // arrival order (for "newest prey" targeting)
      t: 0, state: "arriving", anchor: null, struggle: 1, wrap: 0, feed: 0, held: false
    });
  }

  function nearestWebParticle(x, y) {
    var ps = sim.composites[0].particles, best = null, bd = Infinity;
    for (var i = 0; i < ps.length; i++) {
      var dx = ps[i].pos.x - x, dy = ps[i].pos.y - y, d = dx * dx + dy * dy;
      if (d < bd) { bd = d; best = ps[i]; }
    }
    return { p: best, d2: bd };
  }

  function updateBugs() {
    if (heldBug) sim.draggedEntity = null;   // don't let the web be dragged while plucking a bug
    for (var i = bugs.length - 1; i >= 0; i--) {
      var b = bugs[i]; b.t++;
      if (b.state === "held") {               // follows the mouse while grabbed
        b.x = sim.mouse.x; b.y = sim.mouse.y;
      } else if (b.state === "arriving") {
        var dx = b.tx - b.x, dy = b.ty - b.y, d = Math.sqrt(dx * dx + dy * dy) || 1;
        b.ang = Math.atan2(dy, dx);
        var nx = dx / d, ny = dy / d, perp = Math.sin(b.t * CONFIG.flight.wobbleFreq + b.phase) * b.wobble;
        b.x += nx * b.speed - ny * perp + (Math.random() - 0.5) * b.wobble;
        b.y += ny * b.speed + nx * perp + (Math.random() - 0.5) * b.wobble;
        var nr = nearestWebParticle(b.x, b.y);
        // stick when it reaches its intended depth (inner OR outer); plus a small chance to
        // get snagged earlier by a thread it passes -> natural inner/outer spread
        if (nr.p && (d < CONFIG.stick.dist || (nr.d2 < CONFIG.stick.dist * CONFIG.stick.dist && Math.random() < CONFIG.stick.snagChance))) {
          b.state = "stuck"; b.anchor = nr.p; b.struggle = 1;
        }
      } else if (b.state === "stuck" || b.state === "wrapping") {
        if (!b.anchor) { bugs.splice(i, 1); continue; }
        b.x = b.anchor.pos.x; b.y = b.anchor.pos.y;   // ride the web point
        if (b.struggle > 0.05) {                      // struggle shakes the web, decaying
          var amp = b.struggle * CONFIG.struggle.amp;
          b.anchor.pos.x += (Math.random() - 0.5) * amp;
          b.anchor.pos.y += (Math.random() - 0.5) * amp;
          b.struggle *= CONFIG.struggle.decay;
        }
      } else if (b.state === "feeding") {
        // held in the spider's mouth: updateSpider positions it each frame (mouthPos).
        // left behind while the spider hunts fresh prey: park it at its centre spot.
        if (!b.held && b.cx != null) { b.x = b.cx; b.y = b.cy; }
      } else if (b.state === "dropping") {            // drained husk falls and fades
        b.vy = (b.vy || 0) + CONFIG.husk.fallGravity; b.y += b.vy; b.x += (b.fvx || 0);
        b.drop = (b.drop || 0) + CONFIG.husk.fade;
        if (b.y > sim.height + 40 || b.drop >= 1) bugs.splice(i, 1);
      }
      // carried: position is set by the spider, nothing to do here
    }
  }

  // shared shading helpers for insect bodies: a radial-gradient "sphere" fill and a soft
  // contact shadow, giving flat silhouettes a rounded, slightly 3D look
  function shadeEllipse(ctx, cx, cy, rx, ry, hi, lo) {
    var g = ctx.createRadialGradient(cx - rx * 0.35, cy - ry * 0.4, Math.min(rx, ry) * 0.12, cx, cy, Math.max(rx, ry) * 1.05);
    g.addColorStop(0, hi); g.addColorStop(1, lo);
    ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, 6.283); ctx.fillStyle = g; ctx.fill();
  }
  function softShadow(ctx, cx, cy, rx, ry) {
    var g = ctx.createRadialGradient(cx + 0.6, cy + 0.9, 0, cx + 0.6, cy + 0.9, Math.max(rx, ry) * 1.3);
    g.addColorStop(0, "rgba(0,0,0,0.45)"); g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.beginPath(); ctx.ellipse(cx + 0.6, cy + 0.9, rx * 1.1, ry * 0.85, 0, 0, 6.283); ctx.fillStyle = g; ctx.fill();
  }

  function drawBugShape(ctx, type) {
    if (type === "fly") {
      softShadow(ctx, 0, 0, 6, 4);
      ctx.fillStyle = "rgba(210,220,235,0.35)";                 // translucent, slightly curved wings
      ctx.beginPath(); ctx.moveTo(-1, -1); ctx.quadraticCurveTo(-9, -9, -13, -2); ctx.quadraticCurveTo(-7, -2, -1, -1); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-1, 1); ctx.quadraticCurveTo(-9, 9, -13, 2); ctx.quadraticCurveTo(-7, 2, -1, 1); ctx.closePath(); ctx.fill();
      shadeEllipse(ctx, 0, 0, 5.5, 2.7, "#4a5568", "#08090a");   // glossy body
      shadeEllipse(ctx, 4.2, -1.3, 1.8, 1.8, "#d35450", "#3a0d08");   // compound eyes
      shadeEllipse(ctx, 4.2, 1.3, 1.8, 1.8, "#d35450", "#3a0d08");
      ctx.fillStyle = "rgba(255,255,255,0.55)";
      ctx.beginPath(); ctx.arc(4.7, -1.8, 0.4, 0, 6.283); ctx.fill();
      ctx.beginPath(); ctx.arc(4.7, 0.8, 0.4, 0, 6.283); ctx.fill();
    } else if (type === "moth") {
      softShadow(ctx, -2, 0, 11, 8);
      var wing = function(sy) {
        ctx.beginPath();
        ctx.moveTo(1, 0);
        ctx.quadraticCurveTo(-4, 9 * sy, -13, 8 * sy);
        ctx.quadraticCurveTo(-9, 2 * sy, 1, 0);
        ctx.closePath();
        var wg = ctx.createLinearGradient(1, 0, -13, 8 * sy);
        wg.addColorStop(0, "rgba(176,164,138,0.95)"); wg.addColorStop(1, "rgba(120,108,86,0.85)");
        ctx.fillStyle = wg; ctx.fill();
      };
      wing(-1); wing(1);
      shadeEllipse(ctx, -2, 0, 5.2, 2.6, "#5c5442", "#1c1a13");
      ctx.strokeStyle = "#2a2720"; ctx.lineWidth = 0.35;         // feeler antennae
      ctx.beginPath(); ctx.moveTo(2, -1); ctx.quadraticCurveTo(6, -4, 8, -3.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(2, 1); ctx.quadraticCurveTo(6, 4, 8, 3.5); ctx.stroke();
    } else if (type === "mosquito") {
      softShadow(ctx, -1, 0, 9, 3);
      ctx.strokeStyle = "#2a2420"; ctx.lineWidth = 0.35;         // long thin dangling legs, 3 pairs w/ a bent knee
      var leg = function(x0, ang1, ang2, len1, len2) {
        var kx = x0 + Math.cos(ang1) * len1, ky = Math.sin(ang1) * len1;
        var ex = kx + Math.cos(ang2) * len2, ey = ky + Math.sin(ang2) * len2;
        ctx.beginPath(); ctx.moveTo(x0, 0); ctx.quadraticCurveTo(kx, ky, ex, ey); ctx.stroke();
      };
      leg(2, Math.PI * 0.35, Math.PI * 0.45, 6, 7); leg(2, -Math.PI * 0.35, -Math.PI * 0.45, 6, 7);
      leg(0, Math.PI * 0.55, Math.PI * 0.62, 6, 8); leg(0, -Math.PI * 0.55, -Math.PI * 0.62, 6, 8);
      leg(-2, Math.PI * 0.72, Math.PI * 0.78, 5, 8); leg(-2, -Math.PI * 0.72, -Math.PI * 0.78, 5, 8);
      ctx.fillStyle = "rgba(200,205,215,0.3)";                   // narrow translucent wings
      ctx.beginPath(); ctx.ellipse(0, -2, 5.5, 1.6, -0.25, 0, 6.283); ctx.fill();
      ctx.beginPath(); ctx.ellipse(0, 2, 5.5, 1.6, 0.25, 0, 6.283); ctx.fill();
      shadeEllipse(ctx, -4, 0, 5.5, 1.2, "#8a7860", "#2a2016");  // slender tapered abdomen
      shadeEllipse(ctx, 1.5, 0, 1.8, 1.5, "#7a6a54", "#241c12"); // thorax
      shadeEllipse(ctx, 5, 0, 1.4, 1.4, "#6a5a46", "#20180e");   // head
      ctx.strokeStyle = "#241c12"; ctx.lineWidth = 0.4;          // proboscis
      ctx.beginPath(); ctx.moveTo(6.2, 0); ctx.lineTo(10, 0); ctx.stroke();
    } else { // roach
      softShadow(ctx, 2, 0, 10, 5);
      ctx.strokeStyle = "#4a3218"; ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.moveTo(5, -1); ctx.lineTo(13, -6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5, 1); ctx.lineTo(13, 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-6, -5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 2); ctx.lineTo(-6, 5); ctx.stroke();
      shadeEllipse(ctx, 0, 0, 8, 4.5, "#8a6438", "#2a1c0c");     // glossy wing-cases
      ctx.strokeStyle = "rgba(0,0,0,0.35)"; ctx.lineWidth = 0.3;
      ctx.beginPath(); ctx.moveTo(-6, 0); ctx.lineTo(6, 0); ctx.stroke();   // suture line
      shadeEllipse(ctx, 5, 0, 3.5, 3.2, "#6b4a24", "#1c1206");   // head
      ctx.strokeStyle = "#3a2610"; ctx.lineWidth = 0.35;         // long antennae
      ctx.beginPath(); ctx.moveTo(7, -1); ctx.quadraticCurveTo(12, -4, 15, -3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(7, 1); ctx.quadraticCurveTo(12, 4, 15, 3); ctx.stroke();
    }
  }

  function drawBugs(ctx) {
    for (var i = 0; i < bugs.length; i++) {
      var b = bugs[i];
      ctx.save();
      ctx.globalAlpha = 1 - (b.drop || 0);                       // fade while dropping away
      ctx.translate(b.x, b.y);
      ctx.rotate(b.ang);
      ctx.scale(b.size, b.size);                                // feeding is timed, no visible shrink
      drawBugShape(ctx, b.type);
      if (b.wrap > 0) {                                          // silk cocoon overlay
        ctx.globalAlpha = (1 - (b.drop || 0)) * Math.min(0.9, b.wrap);
        ctx.fillStyle = "rgba(236,239,245,0.95)";
        ctx.beginPath(); ctx.ellipse(0, 0, 12, 7.5, 0, 0, 6.283); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.6)"; ctx.lineWidth = 0.6;
        var turns = Math.floor(b.wrap * 6);
        for (var w = 0; w < turns; w++) { ctx.beginPath(); ctx.ellipse(0, 0, 12, 7.5, w * 0.5, 0, 6.283); ctx.stroke(); }
      }
      ctx.restore();
    }
  }

  /* ---------------- spider hunting AI (Phase 2: return to centre, wait, approach) ---------- */
  var spiderState = "descend";   // descend -> toCenter -> waiting -> approaching -> atPrey
  var spiderTarget = null;
  var stepClock = 0;

  // newest catchable prey: stuck, or a partially-wrapped one that was abandoned mid-wrap
  function bestPrey() {
    var best = null;
    for (var i = 0; i < bugs.length; i++) {
      var b = bugs[i];
      if ((b.state === "stuck" || b.state === "wrapping") && (!best || b.id > best.id)) best = b;
    }
    return best;
  }

  // a cocoon left at the centre waiting to be eaten (lowest priority, after all catching)
  function pendingCocoon() {
    for (var i = 0; i < bugs.length; i++) if (bugs[i].state === "feeding") return bugs[i];
    return null;
  }

  // true if the user is currently dragging one of the spider's own particles
  function spiderGrabbed() {
    var de = sim.draggedEntity, sp = sim.composites[1];
    return !!(de && sp && sp.particles.indexOf(de) >= 0);
  }

  function nearestWebTo(x, y, maxR) {
    var ps = sim.composites[0].particles, best = null, bd = maxR * maxR;
    for (var i = 0; i < ps.length; i++) {
      var dx = ps[i].pos.x - x, dy = ps[i].pos.y - y, d2 = dx * dx + dy * dy;
      if (d2 < bd) { bd = d2; best = ps[i]; }
    }
    return best;
  }

  // remove a leg's existing grip (so it can be re-planted)
  function dropLegGrip(sp, leg) {
    for (var j = 0; j < sp.constraints.length; j++) {
      var c = sp.constraints[j];
      if (c.isGrip && c.a === leg) { sp.constraints.splice(j, 1); return; }
    }
  }

  // release feet that have been dragged far behind -> legs never stay taut (clean stance)
  function releaseOverstretched() {
    var sp = sim.composites[1]; if (!sp) return;
    var max = 95 * (sp.scale || 1);
    for (var j = sp.constraints.length - 1; j >= 0; j--) {
      var c = sp.constraints[j];
      if (c.isGrip && c.a.pos.sub(c.b.pos).length() > max) sp.constraints.splice(j, 1);
    }
  }

  // directed leg-crawl: plant the next leg on a web point toward the goal; the grip pulls
  // the body along (this is what moves the spider). A small assist smooths progress.
  function legStepToward(tx, ty) {
    var sp = sim.composites[1], web = sim.composites[0], thorax = sp.particles[0].pos;
    var gdx = tx - thorax.x, gdy = ty - thorax.y, gd = Math.sqrt(gdx * gdx + gdy * gdy) || 1;
    var gx = gdx / gd, gy = gdy / gd, sc = sp.scale || 1;
    var reach = 130 * sc, minStep = 28 * sc, best = null, bestScore = -1e9, ps = web.particles;
    for (var i = 0; i < ps.length; i++) {
      var dx = ps[i].pos.x - thorax.x, dy = ps[i].pos.y - thorax.y, d2 = dx * dx + dy * dy;
      if (d2 < minStep * minStep || d2 > reach * reach) continue;
      var d = Math.sqrt(d2), dot = (dx * gx + dy * gy) / d;
      if (dot < 0.25) continue;
      var score = dot + (d / reach) * 0.4;
      if (score > bestScore) { bestScore = score; best = ps[i]; }
    }
    if (best) {
      var leg = sp.legs[(legIndex++) % 8];
      dropLegGrip(sp, leg);
      var g = new DistanceConstraint(leg, best, 0.55, 0); g.isGrip = true; sp.constraints.push(g);
      thorax.x += gx * 0.2; thorax.y += gy * 0.2;
    } else {
      thorax.x += gx * 2; thorax.y += gy * 2;   // off the web -> travel back faster to re-grip
    }
  }

  // settle: plant the next leg on the nearest web point under its foot (gathers the legs
  // around the body so the stance looks natural while wrapping / feeding)
  function settleStep() {
    var sp = sim.composites[1], sc = sp.scale || 1, leg = sp.legs[(legIndex++) % 8];
    var best = nearestWebTo(leg.pos.x, leg.pos.y, 120 * sc);
    if (best) { dropLegGrip(sp, leg); var g = new DistanceConstraint(leg, best, 0.5, 0); g.isGrip = true; sp.constraints.push(g); }
  }

  function legGripped(sp, leg) {
    for (var j = 0; j < sp.constraints.length; j++) {
      var c = sp.constraints[j];
      if (c.isGrip && c.a === leg) return true;
    }
    return false;
  }

  // keep at least `min` feet on the web at all times (support legs), so the stance is stable
  // and never looks sparse; ungripped legs are planted softly on the nearest thread under them
  function groundLegs(min) {
    var sp = sim.composites[1]; if (!sp) return;
    var sc = sp.scale || 1, reach = 120 * sc, cnt = 0, need = [];
    for (var k = 0; k < 8; k++) { if (legGripped(sp, sp.legs[k])) cnt++; else need.push(k); }
    for (var i = 0; i < need.length && cnt < min; i++) {
      var leg = sp.legs[need[i]], best = nearestWebTo(leg.pos.x, leg.pos.y, reach);
      if (best) { var g = new DistanceConstraint(leg, best, CONFIG.groundGrip, 0); g.isGrip = true; sp.constraints.push(g); cnt++; }
    }
  }

  // like groundLegs, but skips the given leg indices (used to keep the front/middle legs
  // planted while the hind legs are freed to swing/fling silk during wrapping)
  function groundLegsExcept(min, exclude) {
    var sp = sim.composites[1]; if (!sp) return;
    var sc = sp.scale || 1, reach = 120 * sc, cnt = 0, need = [];
    for (var k = 0; k < 8; k++) {
      if (exclude.indexOf(k) >= 0) continue;
      if (legGripped(sp, sp.legs[k])) cnt++; else need.push(k);
    }
    for (var i = 0; i < need.length && cnt < min; i++) {
      var leg = sp.legs[need[i]], best = nearestWebTo(leg.pos.x, leg.pos.y, reach);
      if (best) { var g = new DistanceConstraint(leg, best, CONFIG.groundGrip, 0); g.isGrip = true; sp.constraints.push(g); cnt++; }
    }
  }

  // hind legs (III/IV pair, closest to the abdomen) fling silk in an alternating orbit
  // around the prey while wrapping -- real spiders spin the cocoon with their back legs
  var wrapPhase = 0;
  function updateWrapLegs(sc, cx, cy) {
    var sp = sim.composites[1], back = [6, 7];
    wrapPhase += CONFIG.wrap.flingSpeed;
    for (var i = 0; i < 2; i++) {
      var leg = sp.legs[back[i]];
      dropLegGrip(sp, leg);            // free the hind foot so it can sweep, not anchored to a thread
      var ang = wrapPhase + (i === 0 ? 0 : Math.PI);          // opposite sides -> criss-cross fling
      var rad = (CONFIG.wrap.flingRadius * sc) * (0.85 + 0.15 * Math.sin(wrapPhase * 2 + i * Math.PI));
      var tx = cx + Math.cos(ang) * rad, ty = cy + Math.sin(ang) * rad;
      leg.pos.x += (tx - leg.pos.x) * 0.6;
      leg.pos.y += (ty - leg.pos.y) * 0.6;
    }
  }

  // point just beyond the head (chelicerae/mouth), where carried prey should visually hang
  function mouthPos(sp) {
    var th = sp.thorax.pos, hd = sp.head.pos, sc = sp.scale || 1;
    var dx = hd.x - th.x, dy = hd.y - th.y, d = Math.sqrt(dx * dx + dy * dy) || 1;
    var ext = 4 * sc;
    return { x: hd.x + dx / d * ext, y: hd.y + dy / d * ext };
  }

  // gentle clutch toward a point (used while wrapping / feeding)
  function holdNear(x, y) {
    var th = sim.composites[1].particles[0].pos, dx = x - th.x, dy = y - th.y, d = Math.sqrt(dx * dx + dy * dy) || 1;
    if (d > 4) { th.x += dx / d * CONFIG.hold; th.y += dy / d * CONFIG.hold; }
  }

  // detach feet that the drag has stretched far -> the spider can be pulled off the web
  function detachStretchedGrips(sp, maxLen) {
    for (var j = sp.constraints.length - 1; j >= 0; j--) {
      var c = sp.constraints[j];
      if (c.isGrip && c.a.pos.sub(c.b.pos).length() > maxLen) sp.constraints.splice(j, 1);
    }
  }
  function hasGrip(sp) {
    for (var k = 0; k < sp.constraints.length; k++) if (sp.constraints[k].isGrip) return true;
    return false;
  }

  // alternating tetrapod gait: two diagonal sets of 4 legs. One set is planted (stance) and
  // pulls the body along; the other is lifted (swing). They swap every SWING frames, so 4
  // feet are always down and the swing legs step ahead toward the goal -> lifelike walking.
  var GAIT_SETS = [[0, 3, 4, 7], [1, 2, 5, 6]], stanceSet = 0, gaitClock = 0;
  function tetrapodStep(tx, ty) {
    var sp = sim.composites[1], thorax = sp.particles[0].pos, sc = sp.scale || 1;
    var dx = tx - thorax.x, dy = ty - thorax.y, d = Math.sqrt(dx * dx + dy * dy) || 1, ux = dx / d, uy = dy / d;
    var reach = 120 * sc, stride = CONFIG.crawl.stride * sc, SWING = CONFIG.crawl.swing, a, leg, best;
    gaitClock++;
    if (gaitClock % SWING === 0) {                    // swap stance/swing
      stanceSet ^= 1;
      var nStance = GAIT_SETS[stanceSet], nSwing = GAIT_SETS[stanceSet ^ 1];
      for (a = 0; a < 4; a++) {                        // new stance legs plant AHEAD -> pull the body forward
        leg = sp.legs[nStance[a]]; dropLegGrip(sp, leg);
        best = nearestWebTo(leg.pos.x + ux * stride, leg.pos.y + uy * stride, reach);
        if (best) { var g = new DistanceConstraint(leg, best, CONFIG.crawl.gripPlant, 0); g.isGrip = true; sp.constraints.push(g); }
      }
      for (a = 0; a < 4; a++) dropLegGrip(sp, sp.legs[nSwing[a]]);   // new swing legs lift off
    }
    var stance = GAIT_SETS[stanceSet];                // keep the stance set planted if any slipped
    for (a = 0; a < 4; a++) {
      leg = sp.legs[stance[a]];
      if (!legGripped(sp, leg)) { best = nearestWebTo(leg.pos.x, leg.pos.y, reach); if (best) { var g2 = new DistanceConstraint(leg, best, CONFIG.crawl.gripRegrip, 0); g2.isGrip = true; sp.constraints.push(g2); } }
    }
    thorax.x += ux * CONFIG.crawl.assist; thorax.y += uy * CONFIG.crawl.assist;   // body assist
  }

  function updateSpider() {
    if (!spiderOn) return;
    var sp = sim.composites[1]; if (!sp) return;
    if (spiderState === "descend") return;                     // handled by updateDrag
    var thorax = sp.particles[0].pos, hub = sim.composites[0].hub.pos, sc = sp.scale || 1;

    // user is dragging the spider: pause the AI, let stretched feet tear off the web,
    // keep any clutched prey attached; the state resumes on release
    if (spiderGrabbed()) {
      detachStretchedGrips(sp, 40);   // pulled feet let go one by one -> spider tears off the web
      if ((spiderState === "carrying" || spiderState === "feeding") && spiderTarget) {
        var mpG = mouthPos(sp); spiderTarget.x = mpG.x; spiderTarget.y = mpG.y;
      }
      return;
    }

    // torn off the web: drift back toward the hub every frame until the feet can re-grip
    if (!hasGrip(sp)) {
      var rdx = hub.x - thorax.x, rdy = hub.y - thorax.y, rd = Math.sqrt(rdx * rdx + rdy * rdy) || 1;
      thorax.x += rdx / rd * CONFIG.crawl.offWebDrift; thorax.y += rdy / rd * CONFIG.crawl.offWebDrift;
    }

    var t, stationary = false;

    if (spiderState === "toCenter") {
      tetrapodStep(hub.x, hub.y);
      if (Math.hypot(thorax.x - hub.x, thorax.y - hub.y) < 45) spiderState = "waiting";

    } else if (spiderState === "waiting") {
      stationary = true;
      var bp = bestPrey();
      if (bp) { spiderTarget = bp; spiderState = "approaching"; }          // catch first (newest)
      else { var pc = pendingCocoon(); if (pc) { spiderTarget = pc; spiderState = "toFeed"; }  // then feed leftovers
             else if (!hasGrip(sp)) spiderState = "toCenter"; }            // torn off and idle -> crawl back

    } else if (spiderState === "approaching") {
      var bp2 = bestPrey();
      if (!bp2) { spiderTarget = null; spiderState = "toCenter"; return; }
      if (bp2 !== spiderTarget) spiderTarget = bp2;        // always chase the newest catchable prey
      t = spiderTarget;
      tetrapodStep(t.x, t.y);
      if (Math.hypot(thorax.x - t.x, thorax.y - t.y) < 44 * sc) { t.state = "wrapping"; spiderState = "wrapping"; }

    } else if (spiderState === "wrapping") {
      t = spiderTarget;
      if (!t || t.state !== "wrapping") { spiderTarget = null; spiderState = "toCenter"; return; }
      var newer = bestPrey();                              // a NEWER prey lures it away (partial wrap kept)
      if (newer && newer.id > t.id) { spiderTarget = newer; spiderState = "approaching"; return; }
      holdNear(t.x, t.y);                                  // settle gently onto the prey
      updateWrapLegs(sc, t.x, t.y);                        // hind legs sweep/fling silk around the prey
      groundLegsExcept(4, [6, 7]);                         // front/middle legs stay planted for stability
      t.wrap = Math.min(1, t.wrap + (t.wrapRate || 0.006));
      if (t.wrap >= 1) { t.state = "carried"; t.anchor = null; spiderState = "carrying"; }

    } else if (spiderState === "carrying") {               // NON-interruptible: haul to the centre
      t = spiderTarget;
      if (!t || t.state !== "carried") { spiderTarget = null; spiderState = "toCenter"; return; }
      tetrapodStep(hub.x, hub.y);
      t.held = true;
      var mpC = mouthPos(sp); t.x = mpC.x; t.y = mpC.y;   // carried in the chelicerae, not floating at the body centre
      if (Math.hypot(thorax.x - hub.x, thorax.y - hub.y) < 46) {
        t.state = "feeding"; t.cx = hub.x + (Math.random() - 0.5) * 20; t.cy = hub.y + (Math.random() - 0.5) * 20;
        spiderState = "feeding";
      }

    } else if (spiderState === "toFeed") {                 // walk back to a left-over cocoon
      t = spiderTarget;
      if (!t || t.state !== "feeding") { spiderTarget = null; spiderState = "waiting"; return; }
      if (bestPrey()) { spiderTarget = bestPrey(); spiderState = "approaching"; return; }   // fresh prey first
      tetrapodStep(t.cx, t.cy);
      if (Math.hypot(thorax.x - t.cx, thorax.y - t.cy) < 44) spiderState = "feeding";

    } else if (spiderState === "feeding") {
      t = spiderTarget;
      if (!t || t.state !== "feeding") { spiderTarget = null; spiderState = "waiting"; return; }
      if (bestPrey()) { t.held = false; spiderTarget = bestPrey(); spiderState = "approaching"; return; }   // drop cocoon, hunt; resume later
      holdNear(t.cx, t.cy); stationary = true;
      t.held = true;
      var mpF = mouthPos(sp); t.x = mpF.x; t.y = mpF.y;   // held up to the mouth while feeding, not parked below
      t.feed = Math.min(1, t.feed + CONFIG.feedRate);
      if (t.feed >= 1) { t.held = false; t.state = "dropping"; t.vy = 0; t.fvx = (Math.random() - 0.5) * 1; spiderTarget = null; spiderState = "waiting"; }

    } else {
      spiderState = "toCenter";
    }

    releaseOverstretched();               // drop any foot dragged taut -> clean stance
    if (stationary) groundLegs(8);        // at rest: settle all 8 feet down naturally
  }

  var legIndex = 0;
  function loop() {
    updateBugs();    // insects fly in / struggle (struggle perturbs the web)
    updateSpider();  // hunting AI: return to centre, wait, approach newest prey (directed leg-crawl)
    sim.frame(30);   // physics first
    updateDrag();    // then the silk constraint / phase logic (final positional step)
    sim.draw();
    drawDrag();      // dragline drawn on top of the web
    drawBugs(sim.ctx);
    requestAnimFrame(loop);
  }

  // controls
  // let the mouse pluck a stuck/wrapping insect off the web (it then falls away)
  canvas.addEventListener("mousedown", function (e) {
    if (!sim) return;
    var rect = canvas.getBoundingClientRect(), mx = e.clientX - rect.left, my = e.clientY - rect.top;
    var best = null, bd = 26 * 26;
    for (var i = 0; i < bugs.length; i++) {
      var b = bugs[i];
      if (b.state !== "stuck" && b.state !== "wrapping") continue;
      var dx = b.x - mx, dy = b.y - my, d = dx * dx + dy * dy;
      if (d < bd) { bd = d; best = b; }
    }
    if (best) { heldBug = best; best.state = "held"; best.anchor = null; sim.draggedEntity = null; }
  });
  canvas.addEventListener("mouseup", function () {
    if (heldBug) { heldBug.state = "dropping"; heldBug.vy = 0; heldBug.fvx = (Math.random() - 0.5) * 1; heldBug = null; }
  });

  document.getElementById("addBug").addEventListener("click", function () { spawnBug(); });
  document.getElementById("regen").addEventListener("click", build);
  document.getElementById("toggleSpider").addEventListener("click", function () {
    spiderOn = !spiderOn; build();
  });
  window.addEventListener("keydown", function (e) { if (e.key === "r" || e.key === "R") build(); });
  var resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(resizeTimer); resizeTimer = setTimeout(build, 200);
  });

  build();
  loop();
  </script>
</body>
</html>
