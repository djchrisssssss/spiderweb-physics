<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Spiderweb">
  <rect width="512" height="512" rx="112" fill="#0a0a0d"/>
  <!-- faint radial hub glow -->
  <circle cx="256" cy="256" r="210" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="50%" cy="46%" r="55%">
      <stop offset="0" stop-color="#20242c"/>
      <stop offset="1" stop-color="#0a0a0d"/>
